<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Famicom Web Emulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta name="description" content="Play Super Famicom / SNES ROMs directly in your browser with this sleek retro web emulator.">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1 class="logo">SUPER <span>FAMICOM</span></h1>
            <p>Load your local ROM to start playing</p>
        </header>

        <main id="app-main">
            <div class="upload-box" id="drop-zone">
                <input type="file" id="rom-input" accept=".sfc,.smc,.zip" hidden>
                <div class="upload-content">
                    <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <h2>Drag & Drop your ROM here</h2>
                    <p>or</p>
                    <button class="btn" id="browse-btn">Browse Files</button>
                    <p class="file-info">Supports .sfc, .smc, .zip</p>
                </div>
            </div>
            
            <div id="emulator-container" class="hidden">
                <div id="game"></div> <!-- EmulatorJS mounts here -->
                <button id="reset-btn" class="btn btn-secondary mt-4">Load Different ROM</button>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
